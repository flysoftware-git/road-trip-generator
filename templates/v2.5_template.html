    <style>
      :root {
        --terracotta: #C0623E;
        --sandstone: #F5EFE0;
        --canyon: #8B2E0A;
        --sage: #6B8C6B;
        --offwhite: #FAFAF7;
        --dark: #2C1A0E;
      }
      html { scroll-behavior: smooth; }
      body { font-family: system-ui, -apple-system, sans-serif; background: var(--offwhite); color: var(--dark); }
      h1,h2,h3,h4,h5 { font-family: Georgia, Cambria, serif; }

      .tab-btn { padding: 8px 16px; font-size: 14px; font-weight: 600; border-radius: 9999px; transition: all 0.2s; cursor: pointer; white-space: nowrap; border: 2px solid transparent; background: transparent; color: #6b5e50; }
      .tab-btn:hover { background: var(--sandstone); color: var(--dark); }
      .tab-btn.active { background: var(--terracotta); color: #fff; border-color: var(--terracotta); }

      .map-tab-btn { padding: 8px 16px; font-size: 14px; font-weight: 600; border-radius: 9999px; transition: all 0.2s; cursor: pointer; white-space: nowrap; border: 2px solid var(--terracotta); background: #fff; color: var(--terracotta); text-decoration: none; display: inline-flex; align-items: center; gap: 6px; margin-left: auto; }
      .map-tab-btn:hover { background: var(--terracotta); color: #fff; }

      .section-pill { display: inline-flex; align-items: center; gap: 6px; padding: 6px 16px; border-radius: 9999px; font-weight: 700; font-size: 15px; margin-bottom: 12px; }

      .badge { display: inline-block; padding: 2px 10px; border-radius: 9999px; font-size: 12px; font-weight: 600; }
      .badge-hike-strenuous { background: #dc2626; color: #fff; }
      .badge-hike-moderate { background: #16a34a; color: #fff; }
      .badge-hike-easy { background: #22c55e; color: #fff; }
      .badge-scenic { background: #2563eb; color: #fff; }
      .badge-cultural { background: #7c3aed; color: #fff; }
      .badge-mustsee { background: #ea580c; color: #fff; }
      .badge-activity { background: #0d9488; color: #fff; }
      .badge-cuisine { background: var(--sandstone); color: var(--dark); border: 1px solid #d4c4a8; }
      .badge-price { background: #fef3c7; color: #92400e; border: 1px solid #fcd34d; }
      .badge-reserve { background: #ea580c; color: #fff; }

      .attraction-link { color: var(--terracotta); text-decoration: none; font-weight: 700; transition: all 0.15s; }
      .attraction-link:hover { text-decoration: underline; }
      .restaurant-link { color: var(--canyon); text-decoration: none; font-weight: 700; transition: all 0.15s; }
      .restaurant-link:hover { text-decoration: underline; }

      .notion-header-btn {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        background: rgba(255,255,255,0.1);
        color: #fff;
        border: 1px solid rgba(255,255,255,0.4);
        border-radius: 9999px;
        padding: 5px 14px;
        font-size: 13px;
        font-weight: 600;
        text-decoration: none;
        transition: background 0.15s;
        white-space: nowrap;
      }
      .notion-header-btn:hover { background: rgba(255,255,255,0.2); }

      @keyframes spin { to { transform: rotate(360deg); } }
      .drive-link { cursor:pointer; color:var(--terracotta); text-decoration:underline; background:none; border:none; padding:0; font:inherit; }
      .drive-link:hover { color:#a0533a; }

      .weather-link {
        display: inline-flex;
        align-items: center;
        gap: 0.3rem;
        margin-top: 0.6rem;
        font-size: 0.8rem;
        font-weight: 600;
        color: #92400E;
        text-decoration: none;
        border: 1px solid #FDE68A;
        background: #FEF3C7;
        padding: 0.25rem 0.75rem;
        border-radius: 999px;
        transition: background 0.15s;
      }
      .weather-link:hover {
        background: #FDE68A;
      }

      /* ── Destination section layout ── */
      .dest-section { background: #fff; border-radius: 16px; box-shadow: 0 2px 12px rgba(44,26,14,0.08); overflow: hidden; }
      .dest-header { position: relative; min-height: 220px; background-size: cover; background-position: center; display: flex; flex-direction: column; justify-content: flex-end; padding: 1.5rem; color: #fff; }
      .dest-header::after { content: ''; position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.65) 0%, rgba(0,0,0,0.1) 60%); border-radius: 0; }
      .dest-header > * { position: relative; z-index: 1; }
      .dest-header-actions { display: flex; justify-content: flex-end; gap: 0.5rem; flex-wrap: wrap; margin-bottom: auto; }
      .dest-header h2 { font-size: 2rem; font-weight: 700; margin: 0; color: #fff; text-shadow: 0 1px 4px rgba(0,0,0,0.5); }
      .dest-header .dates { font-size: 0.95rem; opacity: 0.9; margin: 4px 0 0; }
      .dest-header .img-credit { font-size: 0.7rem; opacity: 0.6; margin: 2px 0 0; }

      /* ── Cards ── */
      .card { padding: 1.25rem 1.5rem; border-bottom: 1px solid #f0e8d8; }
      .card:last-child { border-bottom: none; }
      .card h3 { font-size: 1.05rem; font-weight: 700; color: var(--canyon); margin: 0.25rem 0 0.95rem; padding: 0.1rem 0; display: flex; align-items: center; gap: 6px; }
      .card h3::before { content: none; display: none; }
      .intro-note-card { background: #f6f2e8; }
      .intro-note-text { font-size: 0.95rem; line-height: 1.7; color: #5c4a35; margin: 0; }

      /* ── Expected environment ── */
      .env-card { background: #fffbeb; border-top: 4px solid #f59e0b; }
      .env-card h3 { color: #d97706; }
      .env-subcard { border-radius: 12px; background: #fffbeb; }
      .env-summary { font-size: 0.98rem; line-height: 1.7; color: #78350f; margin: 0 0 0.75rem; }
      .temp-range { display: inline-block; background: #fef3c7; color: #92400e; border: 1px solid #fde68a; border-radius: 9999px; padding: 4px 14px; font-size: 0.85rem; font-weight: 600; margin: 0.4rem 0 0.2rem; }
      .pack-list { font-size: 0.88rem; color: #78350f; margin-top: 0.6rem; line-height: 1.6; }

      /* ── Getting here ── */
      .getting-here-card { position: relative; }
      .getting-here-subcard { background: #faf7f2; border-radius: 12px; border: 1px solid #e8dcc8; }
      .getting-here-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.75rem; }
      .getting-here-header h3 { margin: 0; color: var(--canyon); }
      .gmaps-link { color: #c0714a; font-weight: 600; text-decoration: none; font-size: 0.92rem; padding-right: 4px; }
      .gmaps-link:hover { text-decoration: underline; }
      .route-badges { display: flex; gap: 0.6rem; margin: 0.5rem 0 0.75rem; flex-wrap: wrap; }
      .route-badges-inline { margin: 0; }
      .route-headline { font-size: 1rem; font-weight: 700; color: var(--canyon); margin: 0.15rem 0 0.2rem; }
      .route-headline-row { display: flex; align-items: center; justify-content: space-between; gap: 0.8rem; flex-wrap: nowrap; margin: 0.35rem 0 0.55rem; }
      .route-headline-row .route-badges { margin: 0; }
      .badge-distance, .badge-time { background: #fef3c7; color: #92400e; border: 1px solid #fde68a; border-radius: 9999px; padding: 4px 12px; font-size: 0.83rem; font-weight: 600; }
      .route-summary { font-size: 0.92rem; color: #5c4a35; line-height: 1.65; margin: 0; }
      .can-miss-header { font-weight: 700; color: var(--canyon); font-size: 0.85rem; letter-spacing: 0.05em; margin: 0.75rem 0 0.5rem; text-transform: uppercase; }
      .en-route-stops { display: flex; flex-direction: column; gap: 0.4rem; margin-top: 0.3rem; }
      .stop-card { background: #fff; border: 1px solid #e0d5c7; border-radius: 8px; padding: 0.7rem 0.9rem; font-size: 0.9rem; line-height: 1.55; display: flex; align-items: flex-start; gap: 0.6rem; }
      .stop-icon { display: inline-block; font-size: 1.1rem; min-width: 20px; text-align: center; }
      .stop-body { flex: 1; }
      .stop-desc { margin-top: 0.2rem; color: #5c4a35; }
      .stop-detour { font-size: 0.8rem; color: #8B6347; font-weight: 600; margin-left: 0.25rem; }

      /* ── Attractions ── */
      .attraction-list { list-style: none; padding: 0; margin: 0; display: grid; grid-template-columns: 1fr; gap: 0.8rem; }
      @media (min-width: 768px) { .attraction-list { grid-template-columns: 1fr 1fr; } }
      .attr-item { background: #faf7f2; border: 1px solid #e8dcc8; border-radius: 12px; padding: 1rem; display: flex; flex-direction: column; gap: 0.5rem; transition: box-shadow 0.2s; text-align: center; }
      .attr-item:hover { box-shadow: 0 4px 12px rgba(44, 26, 14, 0.1); }
      .attr-header { display: flex; align-items: center; gap: 0.6rem; }
      .attr-header-inline { justify-content: center; flex-wrap: wrap; }
      .attr-icon { font-size: 1.3rem; min-width: 20px; }
      .attr-name { font-weight: 700; font-size: 0.98rem; color: var(--canyon); line-height: 1.3; }
      .attr-link { color: var(--terracotta); text-decoration: none; }
      .attr-link:hover { text-decoration: underline; }
      .attr-badges { display: flex; gap: 0.4rem; flex-wrap: wrap; align-items: center; justify-content: center; }
      .attr-badges-inline { margin-left: 0; }
      .attr-desc { font-size: 0.88rem; color: #5c4a35; line-height: 1.55; }
      .practical-note { font-size: 0.82rem; color: #7c6a55; font-style: italic; }
      .drive-pill { cursor: pointer; color: var(--terracotta); text-decoration: underline; font-weight: 700; }
      .drive-pill:hover { color: #a0533a; }
      .attr-external-link { color: #8B6347; font-size: 0.8rem; font-weight: 600; text-decoration: none; margin-left: 0.45rem; }
      .attr-external-link:hover { text-decoration: underline; }
      .badge-hike-strenuous { background: #fee2e2; color: #991b1b; font-size: 0.75rem; }
      .badge-hike-moderate { background: #dcfce7; color: #15803d; font-size: 0.75rem; }
      .badge-hike-easy { background: #dcfce7; color: #15803d; font-size: 0.75rem; }
      .badge-mustsee { background: #fed7aa; color: #92400e; font-size: 0.75rem; font-weight: 700; }
      .badge-duration { background: #e0f2fe; color: #0369a1; font-size: 0.75rem; }

      /* ── Schedule ── */
      .schedule-note { font-size: 0.86rem; color: #7c6a55; font-style: italic; margin-bottom: 0.75rem; }
      .schedule-days { display: grid; grid-template-columns: 1fr; gap: 0.9rem; }
      .schedule-days-two-col { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      @media (max-width: 900px) { .schedule-days-two-col { grid-template-columns: 1fr; } }
      .schedule-day { margin-bottom: 0.1rem; background: #fff; border: 1px solid #f0e8d8; border-radius: 10px; padding: 0.8rem 0.9rem; }
      .schedule-day-title { font-size: 0.95rem; font-weight: 700; color: var(--canyon); margin-bottom: 0.5rem; text-transform: capitalize; }
      .schedule-period { margin-bottom: 0.6rem; }
      .schedule-line { display: grid; grid-template-columns: 126px minmax(0, 1fr); align-items: start; column-gap: 0.6rem; }
      .schedule-time { display: inline-flex; width: 126px; color: var(--canyon); font-weight: 700; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.06em; align-items: center; gap: 0.35rem; white-space: nowrap; }
      .schedule-summary { display: block; min-width: 0; overflow-wrap: anywhere; font-size: 0.9rem; color: #5c4a35; line-height: 1.6; }
      .schedule-time-inline { display: inline-flex; min-width: 0; color: var(--canyon); font-weight: 700; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.06em; align-items: center; gap: 0.35rem; white-space: nowrap; }
      .schedule-icon { font-size: 0.9rem; margin-right: 0; flex: 0 0 auto; }
      .schedule-list { padding: 0; margin: 0; display: flex; flex-direction: column; gap: 0.5rem; }
      .schedule-item { font-size: 0.9rem; color: #5c4a35; line-height: 1.65; padding-left: 0; list-style: none; }

      /* ── Scenic drives ── */
      .drive-buttons { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 0.25rem; }
      .drive-link { cursor: pointer; color: var(--terracotta); text-decoration: underline; }
      .drive-link:hover { color: #a0533a; }

      /* ── Cultural events ── */
      .events-card { background: #faf7f2; border-top: 4px solid #e8dcc8; }
      .events-card h3 { color: var(--canyon); }
      .events-subcard { border-radius: 12px; background: #fff; }
      .events-date-range { font-weight: 700; color: var(--canyon); font-size: 0.85rem; letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 0.5rem; }
      .events-intro { font-size: 0.92rem; color: #5c4a35; margin: 0 0 0.75rem; line-height: 1.65; }
      .events-honest { font-size: 0.92rem; color: #5c4a35; line-height: 1.65; }
      .events-list { display: flex; flex-direction: column; gap: 0.5rem; padding: 0; margin: 0; }
      .event-item { background: #fff; border: 1px solid #e8dcc8; border-radius: 8px; padding: 0.7rem 0.9rem; font-size: 0.88rem; line-height: 1.55; }
      .event-link { color: var(--terracotta); text-decoration: none; font-weight: 600; }
      .event-link:hover { text-decoration: underline; }

      /* ── Restaurants ── */
      .restaurant-list { list-style: none; padding: 0; margin: 0; display: grid; grid-template-columns: 1fr; gap: 0.8rem; }
      @media (min-width: 768px) { .restaurant-list { grid-template-columns: 1fr 1fr; } }
      .rest-item { background: #faf7f2; border: 1px solid #e8dcc8; border-radius: 12px; padding: 1rem; display: flex; flex-direction: column; gap: 0.6rem; text-align: center; }
      .rest-header { display: flex; align-items: center; }
      .rest-header-inline { justify-content: center; gap: 0.8rem; flex-wrap: wrap; }
      .rest-name { font-weight: 700; font-size: 0.98rem; color: var(--canyon); }
      .rest-icon { margin-right: 0.35rem; }
      .rest-link { color: var(--canyon); text-decoration: none; }
      .rest-link:hover { text-decoration: underline; }
      .rest-badges { display: flex; gap: 0.4rem; flex-wrap: wrap; align-items: center; justify-content: center; margin-top: 0.3rem; }
      .cuisine-badge { background: var(--sandstone); color: var(--dark); border: 1px solid #d4c4a8; border-radius: 9999px; padding: 3px 11px; font-size: 0.77rem; font-weight: 600; }
      .badge-price { background: #fef3c7; color: #92400e; border: 1px solid #fde68a; border-radius: 9999px; padding: 3px 10px; font-size: 0.77rem; font-weight: 600; }
      .badge-reserve { background: #fed7aa; color: #92400e; border-radius: 9999px; padding: 3px 10px; font-size: 0.77rem; font-weight: 600; }
      .rest-desc { font-size: 0.88rem; color: #5c4a35; line-height: 1.55; margin-top: 0.3rem; }
      .restaurant-note { font-size: 0.82rem; color: #7c6a55; font-style: italic; margin-top: 0.75rem; margin-bottom: 0; }

      /* ── Trip-wide packing summary ── */
      .pack-summary-card { background: #fdf7ea; }
      .pack-summary-intro { margin: 0 0 0.75rem; color: #6b5e50; }
      .pack-summary-list { margin: 0; padding-left: 1.1rem; display: grid; gap: 0.5rem; }
      .pack-summary-places { color: #8B6347; font-size: 0.82rem; }

      /* ── Planning links ── */
      .links-list { list-style: none; padding: 0; margin: 0; display: flex; flex-wrap: wrap; gap: 0.4rem; }
      .links-list li a { display: inline-flex; align-items: center; gap: 5px; background: #fff; border: 1px solid #d4c4a8; color: var(--canyon); border-radius: 9999px; padding: 4px 14px; font-size: 0.82rem; font-weight: 600; text-decoration: none; transition: background 0.15s; }
      .links-list li a:hover { background: var(--sandstone); }
      .local-tip { background: #fef3c7; border: 1px solid #fde68a; border-radius: 8px; padding: 0.6rem 0.9rem; font-size: 0.86rem; color: #78350f; line-height: 1.55; margin-top: 0.75rem; font-weight: 600; }

      /* ── Photo gallery ── */
      .photo-gallery { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.75rem; padding: 0.75rem 0 1.5rem; margin: 0; }
      .photo-gallery-single { grid-template-columns: minmax(300px, 640px); justify-content: center; }
      @media (max-width: 767px) { .photo-gallery { grid-template-columns: repeat(2, 1fr); } }
      @media (max-width: 479px) { .photo-gallery { grid-template-columns: 1fr; } }
      .photo-item { position: relative; }
      .photo-item a { display: block; }
      .photo-item img { width: 100%; aspect-ratio: 3/2; object-fit: cover; border-radius: 10px; display: block; transition: opacity 0.2s; }
      .photo-item a:hover img { opacity: 0.88; }
      .photo-caption { font-size: 0.72rem; color: #8B6347; font-style: italic; text-align: center; margin: 0.3rem 0 0; line-height: 1.3; }
      @media print { .photo-gallery { display: none; } }

      @media print {
        .no-print { display: none !important; }
        .print-show { display: block !important; }
        body { background: #fff; font-size: 11pt; }
        .dest-section { page-break-before: always; }
        .dest-section:first-of-type { page-break-before: auto; }
        a[href]::after { content: " (" attr(href) ")"; font-size: 9pt; color: #666; }
        .notion-header-btn { background: none !important; border: none !important; color: var(--terracotta) !important; padding: 0 !important; font-size: 10pt !important; }
        * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
      }

    <!-- LEAFLET OVERVIEW MAP INIT -->
    <script>
    (function(){
      function init(){
        if(typeof L==='undefined'){setTimeout(init,150);return;}
        var stops='<!--MAP_MARKERS_JSON-->';
        var map=L.map('overview-map',{zoomControl:true,scrollWheelZoom:false});
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap contributors',maxZoom:13}).addTo(map);
        L.polyline(stops.map(function(s){return s.c;}),{color:'#C0623E',weight:2.5,dashArray:'7,6',opacity:0.85}).addTo(map);
        stops.forEach(function(s){
          var icon=L.divIcon({
            className:'',
            html:'<div style="display:flex;flex-direction:column;align-items:center;gap:3px;">'+
              '<div style="width:42px;height:42px;border-radius:50%;background:#C0623E;border:2.5px solid #fff;box-shadow:0 2px 7px rgba(0,0,0,0.28);display:flex;flex-direction:column;align-items:center;justify-content:center;">'+
              '<span style="font-size:8px;font-weight:700;color:rgba(255,255,255,0.82);letter-spacing:0.4px;line-height:1;">'+s.mo+'</span>'+
              '<span style="font-size:15px;font-weight:800;color:#fff;line-height:1;">'+s.dy+'</span>'+
              '</div>'+
              '<div style="background:rgba(44,22,10,0.78);color:#fff;font-size:9px;font-weight:600;padding:2px 7px;border-radius:4px;white-space:nowrap;">'+s.name+'</div>'+
              '</div>',
            iconSize:[42,68],iconAnchor:[21,21],popupAnchor:[0,-26]
          });
          L.marker(s.c,{icon:icon}).bindPopup('<b>'+s.name+'</b><br>'+s.mo+' '+s.dy).addTo(map);
        });
        map.fitBounds(L.featureGroup(stops.map(function(s){return L.circleMarker(s.c);})).getBounds().pad(0.1));
      }
      init();
    })();
    </script>

    <script>
      // ── DRIVE DESCRIPTIONS (global) ─────────────────────────────────────────
      var DRIVE_DESCRIPTIONS = {};

      // ── All DOM interactions wrapped in DOMContentLoaded ─────────────────────
      document.addEventListener('DOMContentLoaded', function () {

        // Progressive icon enhancement
        try {
          if (typeof lucide !== 'undefined' && typeof lucide.createIcons === 'function') {
            lucide.createIcons();
          }
        } catch(e) {}

        // ── SCENIC DRIVE POPUP ─────────────────────────────────────────────────
        try {
          window.openDriveInfo = function(title) {
            var cleanTitle = (title || '').replace(/&amp;/g, '&');
            var desc = DRIVE_DESCRIPTIONS[cleanTitle] || DRIVE_DESCRIPTIONS[title];
            if (!desc) { return; }
            var modal  = document.getElementById('drive-modal');
            var titleEl = document.getElementById('drive-modal-title');
            var bodyEl  = document.getElementById('drive-modal-body');
            if (!modal || !titleEl || !bodyEl) { return; }
            titleEl.textContent = cleanTitle;
            var meta = [];
            if (desc.category) meta.push('<span class="badge badge-scenic">' + desc.category.replace(/_/g, ' ') + '</span>');
            if (desc.distance_or_duration) meta.push('<span class="badge badge-duration">' + desc.distance_or_duration + '</span>');
            var blocks = [];
            if (meta.length) {
              blocks.push('<div style="display:flex;gap:0.4rem;flex-wrap:wrap;margin-bottom:0.9rem;">' + meta.join('') + '</div>');
            }
            if (desc.description) {
              blocks.push('<p style="margin:0 0 0.9rem;line-height:1.75;">' + desc.description + '</p>');
            }
            if (desc.best_time) {
              blocks.push('<p style="margin:0 0 0.65rem;"><strong>Best time:</strong> ' + desc.best_time + '</p>');
            }
            if (desc.vehicle_requirement) {
              blocks.push('<p style="margin:0 0 0.65rem;"><strong>Vehicle:</strong> ' + desc.vehicle_requirement + '</p>');
            }
            if (desc.url) {
              blocks.push('<p style="margin:0.8rem 0 0;"><a href="' + desc.url + '" target="_blank" rel="noopener" class="event-link">More Info</a></p>');
            }
            bodyEl.innerHTML  = blocks.join('');
            modal.style.display = 'flex';
            document.body.style.overflow = 'hidden';
          };

          document.querySelectorAll('.drive-link').forEach(function(btn) {
            btn.addEventListener('click', function(e) {
              e.preventDefault();
              window.openDriveInfo(btn.getAttribute('data-drive-title') || btn.textContent.trim());
            });
          });

          var driveModal = document.getElementById('drive-modal');
          var driveClose = document.getElementById('drive-modal-close');
          function closeDrive() {
            if (driveModal) { driveModal.style.display = 'none'; document.body.style.overflow = ''; }
          }
          if (driveClose) driveClose.addEventListener('click', closeDrive);
          if (driveModal) driveModal.addEventListener('click', function(e) { if (e.target === driveModal) closeDrive(); });
          document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeDrive(); });
        } catch(e) { console.error('Scenic drive popup error:', e); }

        // ── TAB NAVIGATION ─────────────────────────────────────────────────────
        try {
          var navEl = document.getElementById('tab-nav-e5f6');
          document.querySelectorAll('.tab-btn[data-tab]').forEach(function(btn) {
            btn.addEventListener('click', function() {
              document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
              btn.classList.add('active');
              var target = document.getElementById(btn.dataset.tab);
              if (target) {
                var navH = navEl ? navEl.offsetHeight : 64;
                window.scrollTo({ top: target.getBoundingClientRect().top + window.pageYOffset - navH - 16, behavior: 'smooth' });
              }
            });
          });

          // Active tab on scroll
          var sections = document.querySelectorAll('.dest-section');
          var tabBtns  = document.querySelectorAll('.tab-btn[data-tab]');
          var scrollTout;
          window.addEventListener('scroll', function() {
            if (scrollTout) return;
            scrollTout = setTimeout(function() {
              scrollTout = null;
              var navH = (navEl ? navEl.offsetHeight : 64) + 32;
              var current = '';
              sections.forEach(function(sec) {
                if (sec.getBoundingClientRect().top < navH + 100) current = sec.id;
              });
              if (current) tabBtns.forEach(function(b) { b.classList.toggle('active', b.dataset.tab === current); });
            }, 80);
          });
        } catch(e) { console.error('Tab nav error:', e); }

        // ── DOWNLOAD / PRINT BUTTON ────────────────────────────────────────────
        try {
          var printBtn = document.getElementById('print-btn-a1b2');
          if (printBtn) {
            printBtn.addEventListener('click', function() {
              try {
                var blob = new Blob([document.documentElement.outerHTML], {type: 'text/html'});
                var url  = URL.createObjectURL(blob);
                var a    = document.createElement('a');
                a.href   = url; a.download = 'southwest-road-trip-itinerary.html';
                document.body.appendChild(a); a.click(); document.body.removeChild(a);
                setTimeout(function() { URL.revokeObjectURL(url); }, 1000);
              } catch(e2) { window.print(); }
            });
          }
        } catch(e) { console.error('Print button error:', e); }

        // ── LEAFLET RESIZE ─────────────────────────────────────────────────────
        try {
          setTimeout(function() {
            document.querySelectorAll('.leaflet-container').forEach(function(c) {
              if (c._leaflet_map) c._leaflet_map.invalidateSize();
            });
          }, 400);
        } catch(e) {}

      }); // end DOMContentLoaded
    </script>

    <script>
    // ── Service Worker (blob URL — caches CDN assets for offline use) ──
    if ('serviceWorker' in navigator) {
      var swCode = [
        "const CACHE = 'sw-road-trip-v1';",
        "const CDN = [",
        "  'https://cdn.tailwindcss.com',",
        "  'https://unpkg.com/lucide@latest',",
        "];",
        "self.addEventListener('install', function(e) {",
        "  e.waitUntil(caches.open(CACHE).then(function(c) {",
        "    return Promise.allSettled(CDN.map(function(u) { return c.add(u).catch(function(){}); }));",
        "  }));",
        "  self.skipWaiting();",
        "});",
        "self.addEventListener('activate', function(e) {",
        "  e.waitUntil(clients.claim());",
        "});",
        "self.addEventListener('fetch', function(e) {",
        "  if (CDN.some(function(u) { return e.request.url.startsWith(u); })) {",
        "    e.respondWith(caches.match(e.request).then(function(r) { return r || fetch(e.request); }));",
        "  }",
        "});",
      ].join('\n');
      try {
        var swBlob = new Blob([swCode], {type: 'application/javascript'});
        var swUrl = URL.createObjectURL(swBlob);
        navigator.serviceWorker.register(swUrl).catch(function() {});
      } catch(e) {}
    }

    // ── Install prompt ──
    var deferredPrompt = null;
    var installBtn = document.getElementById('pwa-install-btn');

    window.addEventListener('beforeinstallprompt', function(e) {
      e.preventDefault();
      deferredPrompt = e;
      if (installBtn) installBtn.style.display = 'flex';
    });

    if (installBtn) {
      installBtn.addEventListener('click', function() {
        if (!deferredPrompt) return;
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then(function() {
          deferredPrompt = null;
          installBtn.style.display = 'none';
        });
      });
    }

    window.addEventListener('appinstalled', function() {
      if (installBtn) installBtn.style.display = 'none';
      deferredPrompt = null;
    });
    </script>

    <!-- PWA: Enhanced installability with canvas-generated icons and manifest -->
    <script>
    (function () {
      /* ── 1. Generate icons via canvas ── */
      function makeIcon(size) {
        var c = document.createElement('canvas');
        c.width = c.height = size;
        var ctx = c.getContext('2d');
        // Background
        ctx.fillStyle = '#C0623E';
        ctx.beginPath();
        ctx.roundRect(0, 0, size, size, size * 0.18);
        ctx.fill();
        // Map emoji
        ctx.font = (size * 0.52) + 'px serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('🗺️', size / 2, size / 2 + size * 0.03);
        return c.toDataURL('image/png');
      }
      var icon192, icon512;
      try { icon192 = makeIcon(192); icon512 = makeIcon(512); } catch(e) {}

      /* ── 2. Inject manifest as blob URL ── */
      var manifest = {
        name: 'Southwest Road Trip — Oct 2025',
        short_name: 'SW Road Trip',
        description: 'Day-by-day itinerary: Utah National Parks · Telluride · Pagosa Springs · Santa Fe',
        start_url: window.location.pathname || '/',
        scope: window.location.pathname || '/',
        display: 'standalone',
        orientation: 'any',
        background_color: '#F5EFE0',
        theme_color: '#C0623E',
        categories: ['travel', 'lifestyle'],
        icons: [
          { src: icon192 || '', sizes: '192x192', type: 'image/png', purpose: 'any maskable' },
          { src: icon512 || '', sizes: '512x512', type: 'image/png', purpose: 'any maskable' }
        ]
      };
      try {
        var mBlob = new Blob([JSON.stringify(manifest)], { type: 'application/manifest+json' });
        var mUrl = URL.createObjectURL(mBlob);
        var mLink = document.createElement('link');
        mLink.rel = 'manifest';
        mLink.href = mUrl;
        document.head.appendChild(mLink);
      } catch(e) {}

      /* ── 3. Register a minimal service worker (best-effort) ── */
      if ('serviceWorker' in navigator) {
        var swSrc = [
          "var CACHE='sw-road-trip-v2';",
          "self.addEventListener('install',function(e){self.skipWaiting();});",
          "self.addEventListener('activate',function(e){e.waitUntil(clients.claim());});",
          "self.addEventListener('fetch',function(e){",
          "  e.respondWith(caches.open(CACHE).then(function(c){",
          "    return c.match(e.request).then(function(r){",
          "      return r||fetch(e.request).then(function(res){",
          "        c.put(e.request,res.clone());return res;",
          "      });",
          "    });",
          "  }));",
          "});"
        ].join('\n');
        try {
          var swBlob2 = new Blob([swSrc], { type: 'application/javascript' });
          var swUrl2 = URL.createObjectURL(swBlob2);
          navigator.serviceWorker.register(swUrl2, { scope: '/' }).catch(function(){});
        } catch(e) {}
      }

      /* ── 4. Install prompt button (fixed position, complements header button) ── */
      var deferredPrompt2 = null;
      window.addEventListener('beforeinstallprompt', function (e) {
        e.preventDefault();
        deferredPrompt2 = e;
        showFixedInstallBtn();
      });

      function showFixedInstallBtn() {
        if (document.getElementById('pwa-install-btn-fixed')) return;
        var btn = document.createElement('button');
        btn.id = 'pwa-install-btn-fixed';
        btn.className = 'no-print';
        btn.innerHTML = '⬇️ Install App';
        btn.style.cssText = [
          'position:fixed;bottom:1.25rem;right:1.25rem;z-index:9999;',
          'background:#C0623E;color:#fff;border:none;border-radius:2rem;',
          'padding:0.6rem 1.2rem;font-size:0.82rem;font-weight:700;',
          'box-shadow:0 4px 16px rgba(0,0,0,0.22);cursor:pointer;',
          'font-family:inherit;letter-spacing:0.02em;',
          'transition:background 0.2s,transform 0.15s;'
        ].join('');
        btn.addEventListener('mouseenter', function(){ btn.style.background='#a04e30'; btn.style.transform='scale(1.04)'; });
        btn.addEventListener('mouseleave', function(){ btn.style.background='#C0623E'; btn.style.transform='scale(1)'; });
        btn.addEventListener('click', function () {
          if (deferredPrompt2) {
            deferredPrompt2.prompt();
            deferredPrompt2.userChoice.then(function (r) {
              if (r.outcome === 'accepted') btn.remove();
              deferredPrompt2 = null;
            });
          }
        });
        document.body.appendChild(btn);
      }

      window.addEventListener('appinstalled', function () {
        var b = document.getElementById('pwa-install-btn-fixed');
        if (b) b.remove();
        deferredPrompt2 = null;
      });
    })();
    </script>
